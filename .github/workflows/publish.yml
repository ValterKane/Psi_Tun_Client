name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained
        run: dotnet publish PsiTun.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Prepare directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/xray
          New-Item -ItemType Directory -Force -Path publish/sing-box

      - name: Download Xray-core
        shell: pwsh
        run: |
          $url = "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip"
          Invoke-WebRequest $url -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath publish/xray -Force
          # Flatten: Xray zip has a versioned subfolder, move xray.exe up if needed
          if (-not (Test-Path publish/xray/xray.exe)) {
            $src = Get-ChildItem publish/xray -Recurse -Filter xray.exe | Select-Object -First 1
            if ($src) { Move-Item $src.FullName publish/xray/xray.exe -Force }
          }
          Remove-Item xray.zip

      - name: Download sing-box
        shell: pwsh
        run: |
          $url = "https://api.github.com/repos/SagerNet/sing-box/releases/latest"
          $release = Invoke-RestMethod $url
          $asset = $release.assets | Where-Object { $_.name -like "*windows-amd64.zip" } | Select-Object -First 1
          Invoke-WebRequest $asset.browser_download_url -OutFile sing-box.zip
          Expand-Archive sing-box.zip -DestinationPath publish/sing-box-tmp -Force
          # Flatten: sing-box zip has a versioned subfolder, move sing-box.exe up
          $src = Get-ChildItem publish/sing-box-tmp -Recurse -Filter sing-box.exe | Select-Object -First 1
          if ($src) { Move-Item $src.FullName publish/sing-box/sing-box.exe -Force }
          Remove-Item publish/sing-box-tmp -Recurse -Force
          Remove-Item sing-box.zip

      - name: Download Runetfreedom rules
        shell: pwsh
        run: |
          $geoUrl = "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat"
          $ipUrl = "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat"
          # Xray looks in its working directory
          Invoke-WebRequest $geoUrl -OutFile publish/xray/geosite.dat
          Invoke-WebRequest $ipUrl -OutFile publish/xray/geoip.dat
          # sing-box rule-sets (.srs files)
          $rulesZipUrl = "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/sing-box.zip"
          Invoke-WebRequest $rulesZipUrl -OutFile rules.zip
          Expand-Archive rules.zip -DestinationPath publish/sing-box/rules -Force
          Remove-Item rules.zip

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath PsiTun.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PsiTun ${{ github.ref_name }}
          files: PsiTun.zip
          draft: false
          prerelease: false
